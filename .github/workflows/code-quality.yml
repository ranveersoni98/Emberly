name: Code Quality

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master, dev ]

jobs:
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        uses: nick-fields/retry@v2
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: bun install

      - name: Type Check
        run: bun x tsc --noEmit

      - name: Lint
        run: bun run lint

      - name: Check formatting
        run: bun x prettier --check "**/*.{ts,tsx,js,jsx,json,md}"